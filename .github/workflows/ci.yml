name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v2

      - name: Run tests
        run: mise test

      - name: Build PDFs
        run: mise run build

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: pdfs
          path: |
            examples/*.pdf
            docs/api-reference.pdf
